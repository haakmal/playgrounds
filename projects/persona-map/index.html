<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Persona Mapper</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght0400;500;600;700&display=swap" rel="stylesheet">
  <link href="style.css" type="stylesheet">
</head>

<body class="bg-gray-50 text-gray-800 antialiased">
  <div class="min-h-screen grid grid-cols-1 md:grid-cols-2 gap-4 lg:gap-8 p-4 lg:p-8">
  </div>


<!-- BEGIN RETURN LINK -->
<script>
// inject-home-link.js
(function () {
	// Inject Font Awesome stylesheet
	const fa = document.createElement("link");
	fa.rel = "stylesheet";
	fa.href = "https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.2/css/all.min.css";
	fa.crossOrigin = "anonymous";
	document.head.appendChild(fa);
	
	// Create the back link
	const link = document.createElement("a");
	link.href = "/";
	link.innerHTML = '← Back to Playgrounds <i class="fab fa-github"><i>';
	Object.assign(link.style, {
	  position: "fixed",
	  bottom: "20px",
	  right: "20px",
	  background: "#000",
	  color: "#fff",
	  padding: "8px 12px",
	  zIndex: 1000,
	  fontSize: "14px",
	  opacity: 0.7,
	  borderRadius: "6px",
	  textDecoration: "none"
	});
	link.onmouseover = () => (link.style.opacity = "1");
	link.onmouseout = () => (link.style.opacity = "0.7");
	document.body.appendChild(link);
})();
</script>
<!-- END RETURN LINK -->

</body>

</html>
