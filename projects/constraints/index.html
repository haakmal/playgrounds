<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Constraint Cards – Randomiser</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="wrap">

    <!-- LEFT: CARD DISPLAY -->
    <div class="cardsArea">
      <div class="cards" id="cards">
        <!-- Cards injected by script.js -->
      </div>
    </div>


    <!-- RIGHT: ACTION + (HIDDEN) OPTIONS + HISTORY -->
    <div class="sidePanel">

      <!-- Primary action -->
      <div class="actionPanel">
        <button class="primary" id="drawBtn">Random Constraint</button>

        <details class="optionsDrawer">
          <summary>
            Show options
            <span class="hint">Try random drawing first, don’t start with options.</span>
          </summary>

          <div class="controls" id="controls">

            <div>
              <label for="category">Category</label>
              <select id="category"></select>
            </div>

            <div>
              <label for="drawCount">Draw</label>
              <select id="drawCount">
                <option value="1">1 Constraint</option>
                <option value="2">2 Constraints</option>
                <option value="3">3 Constraints</option>
              </select>
            </div>

            <div>
              <label for="noRepeats">No Repeats</label>
              <select id="noRepeats">
                <option value="on" selected>On</option>
                <option value="off">Off</option>
              </select>
            </div>

            <div class="btnRow">
              <button id="copyBtn">Copy</button>
              <button id="resetBtn">Reset</button>
            </div>

          </div>
        </details>
      </div>


      <!-- History -->
      <div class="historySection">
        <h2>History</h2>
        <div class="history" id="history">
          <!-- History injected by script.js -->
        </div>
      </div>

    </div>

  </div>
  <script src="script.js"></script>

<!-- BEGIN RETURN LINK -->
<script>
// inject-home-link.js
(function () {
	// Inject Font Awesome stylesheet
	const fa = document.createElement("link");
	fa.rel = "stylesheet";
	fa.href = "https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.2/css/all.min.css";
	fa.crossOrigin = "anonymous";
	document.head.appendChild(fa);
	
	// Create the back link
	const link = document.createElement("a");
	link.href = "/";
	link.innerHTML = '← Back to Playgrounds <i class="fab fa-github"><i>';
	Object.assign(link.style, {
	  position: "fixed",
	  bottom: "20px",
	  right: "20px",
	  background: "#000",
	  color: "#fff",
	  padding: "8px 12px",
	  zIndex: 1000,
	  fontSize: "14px",
	  opacity: 0.7,
	  borderRadius: "6px",
	  textDecoration: "none"
	});
	link.onmouseover = () => (link.style.opacity = "1");
	link.onmouseout = () => (link.style.opacity = "0.7");
	document.body.appendChild(link);
})();
</script>
<!-- END RETURN LINK -->

</body>
</html>
